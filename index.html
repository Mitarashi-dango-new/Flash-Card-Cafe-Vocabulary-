<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習ページ</title>

<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background:#f2e9e4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:500px;
    text-align:center;
}

.mode{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

.mode button{
    width:140px;
}

.active{
    background:#8b5e3c;
}

.card{
    background:#fff8f0;
    padding:70px;
    border-radius:20px;
    font-size:2rem;
    cursor:pointer;
    color:#6b4226;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.controls{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:12px;
    background:#d6a77a;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.page{
    margin-top:10px;
    color:#6b4226;
    font-weight:bold;
}

.answer{
    display:none;
    margin-top:20px;
    justify-content:center;
    gap:20px;
}

.answer button{
    width:150px;
}

.correct{
    background:#4caf50;
}

.wrong{
    background:#e74c3c;
}

.score{
    margin-top:15px;
    color:#6b4226;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <!-- 学習モード切替 -->
    <div class="mode">
        <button id="normalBtn" class="active" onclick="setMode(false)">登録順</button>
        <button id="sortBtn" onclick="setMode(true)">苦手順</button>
    </div>

    <div class="card" id="card">Loading...</div>

    <div class="page" id="page"></div>

    <div class="answer" id="answer">
        <button class="correct" onclick="recordAnswer(true)">⭕ 正解</button>
        <button class="wrong" onclick="recordAnswer(false)">❌ 不正解</button>
    </div>

    <div class="score" id="score"></div>

    <div class="controls">
        <button onclick="prev()">前へ</button>
        <button onclick="next()">次へ</button>
    </div>

    <br>
    <a href="home.html">ホーム</a>

</div>

<script>

let cards = JSON.parse(localStorage.getItem("flashcards")) || [
    {
        front:"Apple",
        back:"りんご",
        correct:0,
        wrong:0
    },
    {
        front:"Dog",
        back:"犬",
        correct:0,
        wrong:0
    }
];

// 古いデータ対応
cards.forEach(card=>{
    if(card.correct===undefined) card.correct=0;
    if(card.wrong===undefined) card.wrong=0;
});

// 表示用配列
let studyCards = [];

// false=登録順 true=苦手順
let sortMode = false;

let i = 0;
let front = true;

const card = document.getElementById("card");
const page = document.getElementById("page");
const answerBox = document.getElementById("answer");
const score = document.getElementById("score");

function save(){
    localStorage.setItem("flashcards",JSON.stringify(cards));
}

// 正解率
function rate(c){
    const total=c.correct+c.wrong;
    return total===0 ? 0 : c.correct/total;
}

// 学習配列を更新
function updateStudyCards(){

    if(!sortMode){

        // 登録順
        studyCards=[...cards];

    }else{

        // 苦手順
        studyCards=[...cards];

        studyCards.sort((a,b)=>{

            const r1=rate(a);
            const r2=rate(b);

            if(r1!==r2){
                return r1-r2;
            }

            const t1=a.correct+a.wrong;
            const t2=b.correct+b.wrong;

            return t2-t1;

        });

    }

    if(i>=studyCards.length){
        i=studyCards.length-1;
    }

    if(i<0){
        i=0;
    }

}

function setMode(mode){

    sortMode=mode;

    document.getElementById("normalBtn").classList.toggle("active",!mode);
    document.getElementById("sortBtn").classList.toggle("active",mode);

    i=0;
    front=true;

    updateStudyCards();

    render();

}

updateStudyCards();

function render(){

    if(studyCards.length===0){

        card.textContent="単語がありません";
        page.textContent="";
        score.textContent="";
        answerBox.style.display="none";
        return;

    }

    const c=studyCards[i];

    card.textContent=front ? c.front : c.back;

    page.textContent=`${i+1} / ${studyCards.length}`;

    answerBox.style.display=front ? "none":"flex";

    score.textContent=`⭕ ${c.correct}　❌ ${c.wrong}`;
}

// カードをクリック
card.onclick=()=>{
    front=!front;
    render();
};

// 正誤記録
function recordAnswer(correct){

    const c=studyCards[i];

    if(correct){
        c.correct++;
    }else{
        c.wrong++;
    }
    save();

    // 苦手順モードなら並び替えを更新
    if(sortMode){

        // 現在のカードを保持
        const current = c;

        updateStudyCards();

        // 並び替え後の位置を取得
        const newIndex = studyCards.indexOf(current);

        // 次のカードへ
        if(newIndex < studyCards.length - 1){
            i = newIndex + 1;
        }else{
            i = newIndex;
        }

    }else{

        // 登録順モード
        if(i < studyCards.length - 1){
            i++;
        }

    }

    front = true;
    render();

}

// 前へ
function prev(){

    if(i > 0){
        i--;
        front = true;
        render();
    }

}

// 次へ
function next(){

    if(i < studyCards.length - 1){
        i++;
        front = true;
        render();
    }

}

render();

</script>

</body>
</html>
